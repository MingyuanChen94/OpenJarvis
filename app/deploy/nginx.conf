# OpenJarvis app — static PWA server with SPA fallback and an optional,
# SSE-safe reverse proxy to a `jarvis serve` backend.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # /v1, /api, /health — generated at container start by the entrypoint:
    #   - OJ_BACKEND set  -> reverse-proxy to the backend (streaming-safe)
    #   - OJ_BACKEND unset -> `return 502` so the app cleanly enters demo mode
    include /etc/nginx/oj/api.conf;

    # Never cache the app shell or the service worker / manifest.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Fingerprinted build assets are safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
