<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <meta name="description" content="OpenJarvis — local-first personal AI. A fast, private chat and telemetry app." />
    <title>OpenJarvis</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var raw = localStorage.getItem('oj-app-settings');
          var theme = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            theme = (parsed && parsed.state && parsed.state.theme) || theme;
          }
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = theme === 'dark' || (theme === 'system' && prefersDark);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
