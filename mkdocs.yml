site_name: OpenJarvis
site_url: https://open-jarvis.github.io/OpenJarvis/
site_description: Personal AI, On Personal Devices
site_author: OpenJarvis Contributors
repo_url: https://github.com/open-jarvis/OpenJarvis
repo_name: open-jarvis/OpenJarvis
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 OpenJarvis Contributors

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  font:
    text: Georgia
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/@docsearch/css@3

plugins:
  - search:
      separator: '[\s\-\._]+'
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
        - docs/gen_install_script.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: numpy
            docstring_section_style: spacy
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            show_if_no_docstring: false
            inherited_members: false
            filters:
              - "!^_"
              - "^__init__$"
              - "^__all__$"

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/leaderboard.js
  - https://cdn.jsdelivr.net/npm/@docsearch/js@3
  - javascripts/docsearch-init.js

extra:
  version:
    default: v1.0.0
  algolia:
    app_id: ""       # Fill after DocSearch approval
    api_key: ""      # Search-only key
    index_name: ""   # e.g. "openjarvis"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/open-jarvis/OpenJarvis

# Support files that intentionally live in docs/ but are not nav pages
# (an asset README and the abbreviations snippet appended via pymdownx).
not_in_nav: |
  /assets/showcase/README.md
  /includes/abbreviations.md

